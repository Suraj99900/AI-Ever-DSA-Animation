{% extends "base.html" %}
{% block title %}AI-EVER · Sessions{% endblock %}

{% block styles %}
<style>
.ss-page { padding: 20px; max-width: 760px; margin: 0 auto; width: 100%; overflow-y: auto; }
.ss-hint { color: var(--text-muted); font-size: 12.5px; margin-bottom: 16px; }
.ss-card {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 12px 16px; margin-bottom: 8px;
    border: 1px solid var(--border); border-radius: 10px; background: var(--bg-panel);
    animation: ssIn 0.25s ease;
}
@keyframes ssIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; } }
.ss-info { min-width: 0; }
.ss-preview {
    font-family: "Cascadia Code", Consolas, monospace; font-size: 13px;
    color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.ss-meta { color: var(--text-muted); font-size: 11.5px; margin-top: 3px; }
.ss-actions { display: flex; gap: 6px; flex-shrink: 0; }
.ss-empty { color: var(--text-muted); padding: 40px; text-align: center; }
</style>
{% endblock %}

{% block content %}
<div class="ss-page">
    <h2 style="margin-bottom:6px;">💾 Saved Sessions</h2>
    <div class="ss-hint">Every Run is saved automatically (latest 20). Replay loads the code back into the editor.</div>
    <div id="ss-list"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
"use strict";
const esc = (s) => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

function load() {
    let sessions = [];
    try { sessions = JSON.parse(localStorage.getItem("aiever-sessions") || "[]"); } catch (_) {}
    const list = document.getElementById("ss-list");

    if (!sessions.length) {
        list.innerHTML = '<div class="ss-empty">No sessions yet — run some code in the Visualizer first.</div>';
        return;
    }

    list.innerHTML = sessions.map((s, i) => `
        <div class="ss-card">
            <div class="ss-info">
                <div class="ss-preview">${esc(s.preview || "(code)")}</div>
                <div class="ss-meta">${new Date(s.ts).toLocaleString()} · ${s.lines} lines</div>
            </div>
            <div class="ss-actions">
                <button class="btn btn-run" data-replay="${i}">▶ Replay</button>
                <button class="btn" data-del="${i}">🗑</button>
            </div>
        </div>`).join("");

    list.onclick = (e) => {
        const replay = e.target.closest("[data-replay]");
        const del = e.target.closest("[data-del]");
        if (replay) {
            localStorage.setItem("aiever-load-code", sessions[+replay.dataset.replay].code);
            window.location.href = "/";
        } else if (del) {
            sessions.splice(+del.dataset.del, 1);
            localStorage.setItem("aiever-sessions", JSON.stringify(sessions));
            load();
        }
    };
}

document.addEventListener("DOMContentLoaded", load);
</script>
{% endblock %}
